plugins {
    id 'fabric-loom' version '1.1.0'
}

repositories {
    maven { url 'https://maven.fabricmc.net/' }
    mavenCentral()
}

dependencies {
    modCompile 'net.fabricmc:fabric-api:${project.fabric_version}'
    minecraft 'com.mojang:minecraft:1.21.1'
}

minecraft {
    yarnMappings 'net.fabricmc:yarn:1.21.1+build.1:v2'
    loader 'net.fabricmc:fabric-loader:0.12.12'
}